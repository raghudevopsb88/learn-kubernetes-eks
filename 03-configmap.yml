apiVersion: v1
kind: ConfigMap
metadata:
  name: game-demo
data:
  player_initial_lives: "3"
  ui_properties_file_name: "user-interface.properties"
---
apiVersion: v1
kind: Pod
metadata:
  name: configmap-demo1
spec:
  containers:
    - name: demo
      image: rkalluru/learnk8s:rhel9-bare
      env:
        - name: player_initial_lives
          valueFrom:
            configMapKeyRef:
              name: game-demo
              key: player_initial_lives
---
apiVersion: v1
kind: Pod
metadata:
  name: configmap-demo2
spec:
  containers:
    - name: demo
      image: rkalluru/learnk8s:rhel9-bare
      envFrom:
        - configMapRef:
            name: game-demo
