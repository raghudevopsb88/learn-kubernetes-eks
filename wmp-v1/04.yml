## Problems that we have in 02.yml
# 1. A lot of environment hardcoding to yaml file is challenge, Image having 200 inputs.
# Solution here is use configmap and secrets. Secrets are not anyhow secrets, later we will use secret manager. For time being we will keep everything in configmap.

apiVersion: v1
kind: Pod
metadata:
  name: frontend
  labels:
    appName: frontend
spec:
  containers:
  - name: frontend
    image: 739561048503.dkr.ecr.us-east-1.amazonaws.com/frontend
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
data:
  DB_HOST: "wmp-dev.cbvsbeoyxek4.us-east-1.rds.amazonaws.com"
  DB_PORT: "5432"
  DB_USER: "auth_svc_user"
  DB_PASSWORD: "localdev123"
  DB_NAME: "wmp"
  DB_SCHEMA: "auth_schema"
  SERVER_PORT: "8081"
  JWT_SECRET: "myDefaultSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm"
  PORTFOLIO_SERVICE_URL: "http://localhost:8080"

---
apiVersion: v1
kind: Pod
metadata:
  name: auth-service
  labels:
    appName: auth-service
spec:
  containers:
  - name: auth-service
    image: 739561048503.dkr.ecr.us-east-1.amazonaws.com/auth-service
    envFrom:
      - configMapRef:
          name: auth-service-config

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-service-config
data:
  DATABASE_URL: "postgresql+asyncpg://analytics_svc_user:localdev123@wmp-dev.cbvsbeoyxek4.us-east-1.rds.amazonaws.com:5432/wmp"
  DB_SCHEMA: "analytics_schema"
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"

---
apiVersion: v1
kind: Pod
metadata:
  name: analytics-service
  labels:
    appName: analytics-service
spec:
  containers:
  - name: analytics-service
    image: 739561048503.dkr.ecr.us-east-1.amazonaws.com/analytics-service
    envFrom:
      - configMapRef:
          name: analytics-service-config

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: portfolio-service-config
data:
  SPRING_PROFILES_ACTIVE: "production"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://wmp-dev.cbvsbeoyxek4.us-east-1.rds.amazonaws.com:5432/wmp?currentSchema=portfolio_schema"
  SPRING_DATASOURCE_USERNAME: "portfolio_svc_user"
  SPRING_DATASOURCE_PASSWORD: "localdev123"
  JWT_SECRET: "myDefaultSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm"
  SERVER_PORT: "8080"

---
apiVersion: v1
kind: Pod
metadata:
  name: portfolio-service
  labels:
    appName: portfolio-service
spec:
  containers:
  - name: portfolio-service
    image: 739561048503.dkr.ecr.us-east-1.amazonaws.com/portfolio-service
    envFrom:
      - configMapRef:
          name: portfolio-service-config

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  type: LoadBalancer
  selector:
    appName: frontend
  ports:
    - protocol: TCP
      port: 80 # Service Port
      targetPort: 80 # Container Port
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    appName: auth-service
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
spec:
  selector:
    appName: analytics-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-service
spec:
  selector:
    appName: portfolio-service
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
