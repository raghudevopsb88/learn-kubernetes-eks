# service in kubernetes
# 1. Acts like a cluster internal load balancer, In case if we need to send the traffic to multipole pods then it is solution.
# 2. Service when it creates, it also creates a DNS record in coredns in kubernetes cluster, where all the pods can access other services internally with name rather than relying on 3rd party DNS services.
# When communicating
#   If you are in same namespace - curl <service-name>
#   If you are in different namespace - curl <service-name>.<namespace>
#   If you are in different cluster - curl <service-name>.<namespace>.<clustername>

apiVersion: v1
kind: Pod
metadata:
  name: service-demo
  labels:
    topic: services
spec:
  containers:
    - name: nginx
      image: nginx
      ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: service-cip
spec:
  selector:
    topic: services
  ports:
    - protocol: TCP
      port: 80 # Service Port
      targetPort: 80 # Container Port
---
apiVersion: v1
kind: Pod
metadata:
  name: debug
spec:
  containers:
  - name: redhat
    image: rkalluru/learnk8s:rhel9-bare
---
apiVersion: v1
kind: Service
metadata:
  name: service-np
spec:
  type: NodePort
  selector:
    topic: services
  ports:
    - protocol: TCP
      port: 80 # Service Port
      targetPort: 80 # Container Port
---
apiVersion: v1
kind: Service
metadata:
  name: service-lb
spec:
  type: LoadBalancer
  selector:
    topic: services
  ports:
    - protocol: TCP
      port: 80 # Service Port
      targetPort: 80 # Container Port
---
apiVersion: v1
kind: Service
metadata:
  name: service-en
spec:
  type: ExternalName
  externalName: www.columbia.edu




